version: '3.9'

services:

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: marketflow-gateway
    ports:
      - "8000:8000"
    env_file:
      - ../gateway/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - marketflow

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: marketflow-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - marketflow

networks:
  marketflow:
    driver: bridge