name: MarketFlow AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI or API

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/marketflow-ai

jobs:

  # ── Job 1: Lint & test Gateway ────────────────────────────────
  test-gateway:
    name: Test Gateway (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r gateway/requirements.txt

      - name: Lint with ruff (if available)
        run: |
          pip install ruff --quiet || true
          ruff check gateway/ || true

      - name: Check gateway imports
        run: |
          cd gateway
          python -c "import main; print('Gateway imports OK')"
        env:
          PLANNER_API_URL: http://localhost:8001
          CONTENT_GEN_API_URL: http://localhost:8002
          LARAVEL_APP_URL: http://localhost:80
          GITHUB_TOKEN: dummy
          GITHUB_REPO: dummy/dummy

  # ── Job 2: Build & lint Frontend ─────────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_GATEWAY_URL: /api   # In production, proxied through nginx

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Job 3: Build & push Docker images ────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-gateway, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (gateway)
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_GATEWAY_URL=/api

  # ── Job 4: Deploy (optional — SSH to server) ─────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    # Only runs if SSH_HOST secret is set
    # Remove this job if you're deploying to Render/Railway/Fly instead

    steps:
      - uses: actions/checkout@v4

      - name: Check if SSH deployment is configured
        id: check-ssh
        run: |
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SSH_HOST not set — skipping SSH deployment (Docker images are pushed to GHCR)"
          fi

      - name: Deploy via SSH
        if: steps.check-ssh.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/marketflow-ai
            git pull origin main
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml up -d
            docker image prune -f
            echo "Deployment complete at $(date)"