# MarketFlow AI — Kubernetes Manifests
# Run locally: minikube start && kubectl apply -f k8s/
# ─────────────────────────────────────────────────────────────

---
# ── Namespace ─────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: marketflow

---
# ── Gateway ConfigMap ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: marketflow
data:
  PLANNER_API_URL:      "https://marketing-planner-api.onrender.com"
  CONTENT_GEN_API_URL:  "http://localhost:8000"
  LARAVEL_APP_URL:      "http://localhost:80"

---
# ── Gateway Secret (fill before applying) ────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: marketflow
type: Opaque
stringData:
  GROQ_API_KEY:  "your-groq-key-here"
  GITHUB_TOKEN:  "your-github-token-here"
  GITHUB_REPO:   "YOUR_USERNAME/marketflow-ai"

---
# ── Gateway Deployment ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketflow-gateway
  namespace: marketflow
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/YOUR_USERNAME/marketflow-ai-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# ── Gateway Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: marketflow-gateway
  namespace: marketflow
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
# ── Frontend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketflow-frontend
  namespace: marketflow
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_USERNAME/marketflow-ai-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# ── Frontend Service (NodePort for Minikube) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: marketflow-frontend
  namespace: marketflow
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

---
# ── Ingress (optional) ────────────────────────────────────────
# Enable: minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketflow-ingress
  namespace: marketflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: marketflow.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: marketflow-gateway
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketflow-frontend
                port:
                  number: 80